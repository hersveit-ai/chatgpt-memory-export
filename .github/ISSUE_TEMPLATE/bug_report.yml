name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the issue clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead

  - type: input
    id: command
    attributes:
      label: Command you ran
      placeholder: "e.g. python chatgpt_export.py download -j 4"

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste the full error message or traceback
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.1"

  - type: input
    id: chrome-version
    attributes:
      label: Chrome version
      placeholder: "e.g. 124.0.6367.91"
